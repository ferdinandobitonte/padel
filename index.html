<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Club FIXED</title>
</head>
<body>

<script>
// ==============================
// VERSIONE STABILE (RIDOTTA MA FUNZIONANTE)
// Focus: niente bug sync + ranking corretto + cena inclusa
// ==============================

const STORE_KEY = 'padelclub_fixed';
let DB = JSON.parse(localStorage.getItem(STORE_KEY)) || {
  players: [],
  sessions: [],
  currentSession: null
};

let ADMIN_MODE = true; // semplificato

function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(DB));
}

// ==============================
// SESSION
// ==============================
function getSession(){
  let s = DB.sessions.find(x=>x.id===DB.currentSession);
  if(!s){
    s = {
      id: 's'+Date.now(),
      date: new Date().toISOString(),
      checkedIn: [],
      courts: [],
      cena: [],
      finished: false
    };
    DB.sessions.push(s);
    DB.currentSession = s.id;
    save();
  }
  return s;
}

// ==============================
// CENA
// ==============================
function isCena(pid, session){
  return session.cena && session.cena.includes(pid);
}

// ==============================
// MATCH RESULT
// ==============================
function saveMatch(courtIndex, matchIndex, s1, s2){
  const s = getSession();
  const match = s.courts[courtIndex].matches[matchIndex];
  match.score = [s1, s2];

  save();
  render();
}

// ==============================
// CALCOLO CLASSIFICA CAMPO
// ==============================
function calcCourtStandings(court, session){
  const stats = {};

  court.players.forEach(pid=>{
    stats[pid] = { pid, wins:0, games:0, pts:0 };
  });

  court.matches.forEach(m=>{
    if(!m.score) return;

    const [s1,s2] = m.score;
    const t1 = m.t1;
    const t2 = m.t2;

    t1.forEach(p=> stats[p].games += s1);
    t2.forEach(p=> stats[p].games += s2);

    if(s1 > s2){
      t1.forEach(p=> stats[p].wins++);
    } else {
      t2.forEach(p=> stats[p].wins++);
    }
  });

  let arr = Object.values(stats);

  arr.forEach(p=>{
    p.pts = p.wins * 3 + p.games * 0.1;

    // 🔥 FIX IMPORTANTE: cena entra QUI
    if(isCena(p.pid, session)){
      p.pts += 0.5;
    }
  });

  arr.sort((a,b)=> b.pts - a.pts);

  return arr;
}

// ==============================
// GENERA CAMPI
// ==============================
function generateCourt(){
  const s = getSession();
  if(s.checkedIn.length < 4) return;

  const players = [...s.checkedIn];

  const court = {
    players,
    matches: [
      {t1:[players[0],players[1]], t2:[players[2],players[3]], score:null},
      {t1:[players[0],players[2]], t2:[players[1],players[3]], score:null},
      {t1:[players[0],players[3]], t2:[players[1],players[2]], score:null}
    ]
  };

  s.courts = [court];
  save();
}

// ==============================
// RENDER MINIMALE
// ==============================
function render(){
  const s = getSession();

  console.clear();
  console.log('=== SESSION ===');
  console.log(s);

  if(s.courts.length){
    const standings = calcCourtStandings(s.courts[0], s);
    console.log('=== CLASSIFICA CAMPO ===');
    console.table(standings);
  }
}

// ==============================
// TEST DATA
// ==============================
if(DB.players.length === 0){
  DB.players = [
    {id:'p1', name:'A'},
    {id:'p2', name:'B'},
    {id:'p3', name:'C'},
    {id:'p4', name:'D'}
  ];
}

const s = getSession();
s.checkedIn = DB.players.map(p=>p.id);

// esempio cena
s.cena = ['p1'];

generateCourt();

saveMatch(0,0,6,3);
saveMatch(0,1,6,4);
saveMatch(0,2,6,5);

render();

</script>

</body>
</html>
